name: note.com 自動投稿

on:
  schedule:
    - cron: '0 23 * * *'  # JST 08:00
    - cron: '0 3 * * *'   # JST 12:00
    - cron: '0 9 * * *'   # JST 18:00
  workflow_dispatch:  # 手動実行も可能

jobs:
  auto-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write  # 投稿履歴のgit pushに必要

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Playwright ブラウザをインストール
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: 記事を自動生成して投稿
        env:
          # 単一アカウント
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          # 複数アカウント（設定した分だけ有効になります）
          NOTE_EMAIL_1: ${{ secrets.NOTE_EMAIL_1 }}
          NOTE_PASSWORD_1: ${{ secrets.NOTE_PASSWORD_1 }}
          NOTE_EMAIL_2: ${{ secrets.NOTE_EMAIL_2 }}
          NOTE_PASSWORD_2: ${{ secrets.NOTE_PASSWORD_2 }}
          # Groq API（無料・記事生成用）
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Unsplash API（記事画像取得用・任意）
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          # 投稿設定
          POST_AS_DRAFT: ${{ secrets.POST_AS_DRAFT || 'false' }}
          # 通知（未設定ならスキップ）
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          # X (Twitter) 自動告知（未設定ならスキップ）
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          # Gemini API（サムネイル生成用）
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python main.py --headless

      - name: 投稿履歴をコミット
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add post_history.json thumbnails/ || true
          git diff --staged --quiet || git commit -m "📝 投稿履歴を更新 ($(date +'%Y-%m-%d'))"
          git push || true

      - name: スクリーンショットを保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 7
